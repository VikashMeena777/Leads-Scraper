# ──────────────────────────────────────────────────────────────────
#  Lead Generation Pipeline — GitHub Actions
#  Scheduled: rotates 1 city per day (6 cities = 6 day cycle)
#  Manual: pick a specific scraper + city or run all
# ──────────────────────────────────────────────────────────────────
name: "🚀 Lead Gen Pipeline"

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC — runs daily, rotates cities
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      scraper:
        description: "Which scraper to run"
        required: true
        default: "google_maps"
        type: choice
        options:
          - all
          - google_maps
          - justdial
          - google_search
      city:
        description: "City to scrape (leave empty = auto-rotate)"
        required: false
        type: string
      reset:
        description: "Reset scraper state?"
        required: false
        default: false
        type: boolean

env:
  HEADLESS: "true"
  MIN_DELAY: "2"
  MAX_DELAY: "5"

jobs:
  scrape:
    name: "🔍 Scrape Leads"
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      # ── Setup ──────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # ── Google Credentials (from secret) ───────────
      - name: 🔐 Setup Google credentials
        run: |
          mkdir -p config
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > config/credentials.json

      # ── Download state from artifact (persist between runs) ──
      - name: 📂 Download previous state
        uses: dawidd6/action-download-artifact@v6
        with:
          name: lead-gen-state
          path: output/
          if_no_artifact_found: warn
          workflow_conclusion: ""
        continue-on-error: true

      # ── Reset state if requested ───────────────────
      - name: 🔄 Reset state
        if: ${{ github.event.inputs.reset == 'true' }}
        run: |
          rm -f output/state.json
          echo "State reset complete"

      # ── Determine today's city (auto-rotate) ───────
      - name: 🏙️ Pick today's city
        id: city
        run: |
          # Cities list (must match config/cities.json order)
          CITIES=("Jaipur" "Delhi" "Mumbai" "Bangalore" "Hyderabad" "Pune")
          
          # If manual city is specified, use that
          MANUAL_CITY="${{ github.event.inputs.city }}"
          if [ -n "$MANUAL_CITY" ]; then
            echo "name=$MANUAL_CITY" >> $GITHUB_OUTPUT
            echo "🏙️ Using manually specified city: $MANUAL_CITY"
            exit 0
          fi
          
          # For scheduled runs: rotate based on day of year
          DAY_OF_YEAR=$(date +%j)
          CITY_INDEX=$((DAY_OF_YEAR % ${#CITIES[@]}))
          CITY="${CITIES[$CITY_INDEX]}"
          echo "name=$CITY" >> $GITHUB_OUTPUT
          echo "🏙️ Today's city (day $DAY_OF_YEAR, index $CITY_INDEX): $CITY"

      # ── Create output directory ────────────────────
      - name: 📁 Prepare output directory
        run: mkdir -p output

      # ── Run Scrapers (one city at a time) ──────────
      - name: "🗺️ Google Maps Scraper"
        if: ${{ github.event_name == 'schedule' || github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'google_maps' }}
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: config/credentials.json
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CITY="${{ steps.city.outputs.name }}"
          echo "🗺️ Scraping Google Maps: $CITY"
          python scrapers/google_maps_scraper.py --city "$CITY" || true

      - name: "📋 Justdial Scraper"
        if: ${{ github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'justdial' }}
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: config/credentials.json
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CITY="${{ steps.city.outputs.name }}"
          echo "📋 Scraping Justdial: $CITY"
          python scrapers/justdial_scraper.py --city "$CITY" || true

      - name: "🔎 Google Search Scraper"
        if: ${{ github.event.inputs.scraper == 'all' || github.event.inputs.scraper == 'google_search' }}
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: config/credentials.json
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CITY="${{ steps.city.outputs.name }}"
          echo "🔎 Scraping Google Search: $CITY"
          python scrapers/google_search_scraper.py --city "$CITY" || true

      # ── Clean & Upload ─────────────────────────────
      - name: "🧹 Clean & Deduplicate"
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: config/credentials.json
        run: python processor/cleaner.py

      - name: "📊 Upload to Google Sheets"
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: config/credentials.json
        run: python processor/sheets_uploader.py

      # ── Persist state for next run ─────────────────
      - name: 💾 Save state artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lead-gen-state
          path: output/state.json
          overwrite: true
          retention-days: 90

      # ── Save CSV data ──────────────────────────────
      - name: 📤 Upload CSV artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lead-data-${{ github.run_number }}
          path: |
            output/*.csv
          retention-days: 30

      # ── Telegram Notification ──────────────────────
      - name: "✅ Notify Success"
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CITY="${{ steps.city.outputs.name }}"
          LEAD_COUNT=$(wc -l < output/leads_clean.csv 2>/dev/null || echo "0")
          LEAD_COUNT=$((LEAD_COUNT - 1))  # subtract header
          [ $LEAD_COUNT -lt 0 ] && LEAD_COUNT=0

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"✅ <b>Lead Gen Complete</b>\n\n🏙️ City: ${CITY}\n📊 Leads: ${LEAD_COUNT}\n📋 Uploaded to Google Sheets\n🕐 Run: #${{ github.run_number }}\n\n<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Logs</a>\",
              \"parse_mode\": \"HTML\"
            }" || true

      - name: "❌ Notify Failure"
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CITY="${{ steps.city.outputs.name }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": \"❌ <b>Lead Gen Failed</b>\n\n🏙️ City: ${CITY}\n🕐 Run: #${{ github.run_number }}\n\n<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View Logs</a>\",
              \"parse_mode\": \"HTML\"
            }" || true
